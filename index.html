<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Defense</title>
    <style>
        :root {
            --purple-ui: #9b59b6;
            --dark-purple: #8e44ad;
            --side-wood: #7d4d2d;
            --inner-wood: #5d361b;
            --btn-blue: #3498db;
            --btn-green: #2ecc71;
            --gold-color: #f1c40f;
            --heart-color: #e74c3c;
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: var(--ui-font);
            overflow: hidden;
            user-select: none;
        }

        #game-wrapper {
            width: 1100px;
            height: 750px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 6px solid #222;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        /* Top Header Bar */
        #header {
            height: 60px;
            background: var(--purple-ui);
            border-bottom: 6px solid var(--dark-purple);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
            gap: 40px;
            z-index: 10;
        }

        .stat { display: flex; align-items: center; gap: 10px; font-size: 28px; }

        /* Main Game Layout */
        #main-container { display: flex; flex: 1; background: #2c3e50; }

        #canvas-area { position: relative; flex: 1; background: #27ae60; overflow: hidden;}
        canvas { display: block; cursor: crosshair; }

        /* Right Sidebar */
        #sidebar {
            width: 280px;
            background: var(--side-wood);
            border-left: 8px solid var(--inner-wood);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #round-box {
            background: rgba(0,0,0,0.4);
            border: 4px solid var(--inner-wood);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-size: 24px;
        }

        #fighter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .fighter-slot {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.1s;
        }

        .fighter-slot:hover { background: rgba(255, 255, 255, 0.2); }
        .fighter-slot.selected { border-color: var(--gold-color); background: rgba(241, 196, 15, 0.2); }

        .f-icon {
            width: 50px; height: 50px;
            background: #fff;
            margin: 0 auto 5px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .f-cost {
            background: var(--btn-blue);
            font-size: 14px;
            border-radius: 4px;
            display: block;
        }

        /* Overlay Screens */
        .full-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .action-btn {
            background: var(--btn-green);
            border: none;
            padding: 15px 40px;
            font-size: 32px;
            color: white;
            border-radius: 12px;
            border-bottom: 6px solid #27ae60;
            cursor: pointer;
            font-family: var(--ui-font);
        }

        .action-btn:active { transform: translateY(2px); border-bottom-width: 4px; }

        #speed-btn {
            background: var(--btn-blue);
            border-bottom-color: #2980b9;
            margin-top: auto;
            font-size: 24px;
        }

        #upgrade-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .float-info {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s forwards;
            font-weight: bold;
            z-index: 200;
        }

        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- Start Screen -->
        <div id="start-screen" class="full-overlay">
            <h1 style="font-size: 60px; margin-bottom: 20px;">FIGHTER DEFENSE</h1>
            <button class="action-btn" id="start-btn">PLAY</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="full-overlay" style="display: none;">
            <h1 style="font-size: 60px; color: var(--heart-color);">GAME OVER</h1>
            <p style="font-size: 24px;">Survived Round <span id="finish-round">0</span></p>
            <button class="action-btn" onclick="location.reload()">REPLAY</button>
        </div>

        <div id="header">
            <div class="stat"><span id="gold-ui">300</span> <span style="color:var(--gold-color)">🪙</span></div>
            <div class="stat"><span id="lives-ui">100</span> <span style="color:var(--heart-color)">❤️</span></div>
        </div>

        <div id="main-container">
            <div id="canvas-area">
                <canvas id="gameCanvas" width="820" height="690"></canvas>
            </div>

            <div id="sidebar">
                <div id="round-box">Round <span id="round-ui">1</span></div>
                
                <div id="fighter-grid"></div>

                <div id="upgrade-panel">
                    <div id="u-title" style="color: var(--gold-color)">Fighter</div>
                    <div id="u-desc" style="font-size: 12px; font-family: sans-serif;">Level 1</div>
                    <button class="action-btn" id="u-btn" style="font-size: 16px; padding: 10px;">UPGRADE (<span id="u-cost">50</span>)</button>
                    <button class="action-btn" style="padding: 5px; font-size: 12px; background: var(--heart-color);" onclick="closeUpgrade()">CLOSE</button>
                </div>

                <button id="speed-btn" class="action-btn">▶️ x1</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Settings
        const TILE_SIZE = 46;
        const GRID_W = 18;
        const GRID_H = 15;

        const FIGHTER_LIST = [
            { id: 0, name: "Chick", icon: "🐥", cost: 30, range: 100, dmg: 10, rate: 45, color: "#f1c40f" },
            { id: 1, name: "Monkey", icon: "🐒", cost: 50, range: 130, dmg: 18, rate: 50, color: "#9b59b6" },
            { id: 2, name: "Owl", icon: "🦉", cost: 70, range: 160, dmg: 14, rate: 25, color: "#34495e" },
            { id: 3, name: "Dragon", icon: "🐉", cost: 150, range: 240, dmg: 80, rate: 100, color: "#e74c3c" },
            { id: 4, name: "Pig", icon: "🐷", cost: 40, range: 110, dmg: 22, rate: 70, color: "#ff9ff3" },
            { id: 5, name: "Alien", icon: "👽", cost: 100, range: 200, dmg: 12, rate: 15, color: "#1dd1a1" }
        ];

        // State
        let gold = 300;
        let lives = 100;
        let round = 1;
        let playSpeed = 1;
        let running = false;
        let waveInProgress = false;
        
        let fighters = [];
        let enemies = [];
        let projectiles = [];
        let selectionIdx = -1;
        let upgradeTarget = null;

        // Waypoints
        const waypoints = [
            {x: 4, y: 0}, {x: 4, y: 5}, {x: 12, y: 5}, {x: 12, y: 10},
            {x: 6, y: 10}, {x: 6, y: 14}, {x: 18, y: 14}
        ].map(p => ({ x: p.x * TILE_SIZE + TILE_SIZE/2, y: p.y * TILE_SIZE + TILE_SIZE/2 }));

        function initSidebar() {
            const grid = document.getElementById('fighter-grid');
            FIGHTER_LIST.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'fighter-slot';
                div.id = `slot-${i}`;
                div.onclick = () => {
                    selectionIdx = i;
                    upgradeTarget = null;
                    document.getElementById('upgrade-panel').style.display = 'none';
                    document.querySelectorAll('.fighter-slot').forEach(s => s.classList.remove('selected'));
                    div.classList.add('selected');
                };
                div.innerHTML = `<div class="f-icon" style="background:${f.color}">${f.icon}</div><span class="f-cost">${f.cost}</span>`;
                grid.appendChild(div);
            });
        }

        // --- Core Loops ---

        function start() {
            document.getElementById('start-screen').style.display = 'none';
            running = true;
            loop();
        }

        document.getElementById('start-btn').addEventListener('click', start);

        document.getElementById('speed-btn').onclick = () => {
            playSpeed = playSpeed === 1 ? 2.5 : 1;
            document.getElementById('speed-btn').innerHTML = playSpeed === 1 ? "▶️ x1" : "⏩ x2.5";
        };

        function updateUI() {
            document.getElementById('gold-ui').innerText = Math.floor(gold);
            document.getElementById('lives-ui').innerText = Math.max(0, lives);
            document.getElementById('round-ui').innerText = round;
        }

        function createFloatText(txt, x, y, col) {
            const div = document.createElement('div');
            div.className = 'float-info';
            div.innerText = txt;
            div.style.left = (x + canvas.offsetLeft) + 'px';
            div.style.top = (y + canvas.offsetTop) + 'px';
            div.style.color = col;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        // --- Logic Classes ---

        class Enemy {
            constructor() {
                this.x = waypoints[0].x;
                this.y = waypoints[0].y;
                this.target = 1;
                this.maxHp = 25 + (round * 25);
                this.hp = this.maxHp;
                this.speed = 1.7 + (round * 0.05);
            }
            update() {
                const goal = waypoints[this.target];
                const dx = goal.x - this.x;
                const dy = goal.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const step = this.speed * playSpeed;

                if (dist < step) {
                    this.target++;
                    if (this.target >= waypoints.length) {
                        lives -= 5;
                        this.hp = -9999;
                        updateUI();
                        if (lives <= 0) gameOver();
                    }
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.font = "28px Arial";
                ctx.textAlign = "center";
                ctx.fillText("📦", this.x, this.y + 10);
                // Bar
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x - 20, this.y - 25, 40, 5);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(this.x - 20, this.y - 25, 40 * (Math.max(0, this.hp/this.maxHp)), 5);
            }
        }

        class Fighter {
            constructor(gx, gy, data) {
                this.gx = gx; this.gy = gy;
                this.x = gx * TILE_SIZE + TILE_SIZE/2;
                this.y = gy * TILE_SIZE + TILE_SIZE/2;
                this.data = JSON.parse(JSON.stringify(data));
                this.level = 1;
                this.cd = 0;
            }
            update() {
                if (this.cd > 0) this.cd -= playSpeed;
                if (this.cd <= 0) {
                    const target = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < this.data.range);
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.data.dmg, this.data.color));
                        this.cd = this.data.rate;
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.65; // Requested Seethrough look
                ctx.fillStyle = this.data.color;
                ctx.beginPath();
                ctx.roundRect(this.x - 20, this.y - 20, 40, 40, 8);
                ctx.fill();
                
                ctx.globalAlpha = 1.0;
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.data.icon, this.x, this.y + 2);

                if (upgradeTarget === this) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.data.range, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, target, dmg, col) {
                this.x = x; this.y = y; this.target = target;
                this.dmg = dmg; this.col = col;
                this.dead = false;
            }
            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                const step = 11 * playSpeed;
                if (dist < step) {
                    this.target.hp -= this.dmg;
                    this.dead = true;
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.fillStyle = this.col;
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- Input ---

        canvas.addEventListener('mousedown', (e) => {
            if (!running) return;
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const gy = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            const existing = fighters.find(f => f.gx === gx && f.gy === gy);
            if (existing) {
                openUpgrade(existing);
                return;
            }

            if (selectionIdx !== -1) {
                const data = FIGHTER_LIST[selectionIdx];
                if (gold >= data.cost && !isPath(gx, gy)) {
                    gold -= data.cost;
                    fighters.push(new Fighter(gx, gy, data));
                    updateUI();
                }
            }
        });

        function isPath(gx, gy) {
            const px = gx * TILE_SIZE + TILE_SIZE/2;
            const py = gy * TILE_SIZE + TILE_SIZE/2;
            for(let i=0; i<waypoints.length-1; i++) {
                const v = waypoints[i], w = waypoints[i+1];
                const l2 = (v.x-w.x)**2 + (v.y-w.y)**2;
                let t = ((px-v.x)*(w.x-v.x) + (py-v.y)*(w.y-v.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                const dist = Math.hypot(px - (v.x + t*(w.x-v.x)), py - (v.y + t*(w.y-v.y)));
                if (dist < TILE_SIZE * 0.75) return true;
            }
            return false;
        }

        function openUpgrade(f) {
            upgradeTarget = f;
            selectionIdx = -1;
            document.querySelectorAll('.fighter-slot').forEach(s => s.classList.remove('selected'));
            document.getElementById('upgrade-panel').style.display = 'flex';
            document.getElementById('u-title').innerText = f.data.name;
            document.getElementById('u-desc').innerText = `Level ${f.level} | Dmg: ${Math.round(f.data.dmg)}`;
            document.getElementById('u-cost').innerText = f.level * 60;
        }

        document.getElementById('u-btn').onclick = () => {
            if (!upgradeTarget) return;
            const cost = upgradeTarget.level * 60;
            if (gold >= cost) {
                gold -= cost;
                upgradeTarget.level++;
                upgradeTarget.data.dmg *= 1.5;
                upgradeTarget.data.range += 15;
                upgradeTarget.data.rate *= 0.9;
                openUpgrade(upgradeTarget);
                updateUI();
                createFloatText("UP!", upgradeTarget.x, upgradeTarget.y, "#fff");
            }
        };

        function closeUpgrade() {
            upgradeTarget = null;
            document.getElementById('upgrade-panel').style.display = 'none';
        }

        // --- Game Systems ---

        function spawnWave() {
            waveInProgress = true;
            let count = 10 + round * 5;
            let current = 0;
            const intv = setInterval(() => {
                if (!running) { clearInterval(intv); return; }
                enemies.push(new Enemy());
                current++;
                if (current >= count) {
                    clearInterval(intv);
                    const checker = setInterval(() => {
                        if (enemies.length === 0) {
                            clearInterval(checker);
                            waveInProgress = false;
                            round++;
                            gold += 50;
                            updateUI();
                        }
                    }, 500);
                }
            }, 800 / playSpeed);
        }

        function gameOver() {
            running = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('finish-round').innerText = round;
        }

        function drawMap() {
            for(let y=0; y<GRID_H; y++) {
                for(let x=0; x<GRID_W; x++) {
                    ctx.fillStyle = (x+y)%2 === 0 ? "#2ecc71" : "#27ae60";
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
            // Ocean side
            ctx.fillStyle = "#3498db";
            ctx.fillRect(0,0, 40, canvas.height);

            // Detailed Path
            ctx.strokeStyle = "#8b4513";
            ctx.lineWidth = TILE_SIZE;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            waypoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            ctx.strokeStyle = "#a0522d";
            ctx.lineWidth = TILE_SIZE * 0.8;
            ctx.stroke();
        }

        function loop() {
            if (!running) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawMap();

            fighters.forEach(f => { f.update(); f.draw(); });
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => {
                e.update(); e.draw();
                if (e.hp <= 0 && e.hp > -1000) { gold += 8; updateUI(); }
            });

            projectiles = projectiles.filter(p => !p.dead && p.target.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            if (!waveInProgress && enemies.length === 0) spawnWave();
            requestAnimationFrame(loop);
        }

        initSidebar();
    </script>
</body>
</html>
