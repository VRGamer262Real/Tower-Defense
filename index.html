<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Defense</title>
    <style>
        :root {
            --purple-top: #9b59b6;
            --sidebar-brown: #8b4513;
            --sidebar-inner: #5d361b;
            --text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: var(--ui-font);
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 1200px;
            height: 800px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 6px solid #222;
        }

        /* Top Bar */
        #top-bar {
            height: 50px;
            background: var(--purple-top);
            border-bottom: 4px solid #8e44ad;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 24px;
            z-index: 10;
        }

        .stat-group { display: flex; align-items: center; gap: 10px; }
        .gold-display { color: #f1c40f; text-shadow: var(--text-shadow); }

        /* Main Game Area */
        #main-layout { display: flex; flex: 1; position: relative; }

        #canvas-holder { position: relative; flex: 1; background: #27ae60; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background: var(--sidebar-brown);
            border-left: 8px solid var(--sidebar-inner);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.4);
        }

        .life-bar-container {
            width: 100%;
            height: 35px;
            background: #333;
            border-radius: 10px;
            border: 3px solid #5d361b;
            position: relative;
            overflow: hidden;
        }
        #life-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.3s; }
        .life-text { position: absolute; width: 100%; text-align: center; top: 5px; font-size: 18px; text-shadow: 1px 1px 2px black; }

        #round-card {
            background: rgba(0,0,0,0.3);
            border: 4px solid var(--sidebar-inner);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            font-size: 30px;
            text-shadow: var(--text-shadow);
        }

        #fighter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            overflow-y: auto;
            max-height: 420px;
        }

        .fighter-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            border: 4px solid transparent;
            transition: 0.1s;
        }
        .fighter-item:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.2); }
        .fighter-item.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.3); }

        .f-icon-wrap {
            width: 60px; height: 60px;
            background: #fff;
            margin: 0 auto 5px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .f-cost-tag { background: #3498db; font-size: 14px; border-radius: 6px; display: block; }

        #speed-btn {
            background: #3498db;
            border: none;
            border-bottom: 8px solid #2980b9;
            color: white;
            padding: 15px;
            font-size: 32px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: auto;
            font-family: var(--ui-font);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        #speed-btn:active { transform: translateY(4px); border-bottom-width: 4px; }

        #upgrade-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            border: 2px solid white;
        }

        #game-over-pop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- TOP BAR -->
        <div id="top-bar">
            <div>FIGHTER DEFENSE</div>
            <div class="stat-group">
                <span id="gold-ui" class="gold-display">500</span>
                <span style="color:#f1c40f">🪙</span>
            </div>
        </div>

        <div id="main-layout">
            <!-- GAME WORLD -->
            <div id="canvas-holder">
                <canvas id="gameCanvas" width="880" height="750"></canvas>
                <div id="game-over-pop">
                    <h1 style="font-size: 80px; color:#e74c3c">DEFEAT</h1>
                    <p style="font-size: 24px;">You reached Round <span id="final-round">1</span></p>
                    <button id="speed-btn" style="width:200px" onclick="location.reload()">RETRY</button>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div id="sidebar">
                <div class="life-bar-container">
                    <div id="life-fill"></div>
                    <div class="life-text"><span id="health-ui">100</span> ❤️</div>
                </div>

                <div id="round-card">Round <span id="round-ui">1</span></div>
                
                <div id="fighter-grid"></div>

                <!-- UPGRADE PANEL -->
                <div id="upgrade-panel">
                    <div id="up-name" style="color:#f1c40f; font-size:20px">Fighter</div>
                    <div id="up-stats" style="font-size:12px; font-family:sans-serif">Level 1 | Dmg: 10</div>
                    <button id="speed-btn" style="font-size:18px; padding:10px" onclick="upgradeSelected()">
                        UPGRADE (<span id="up-cost">50</span>)
                    </button>
                    <button id="speed-btn" style="background:#e74c3c; border-bottom-color:#c0392b; font-size:14px; padding:5px" onclick="deselect()">CLOSE</button>
                </div>

                <button id="speed-btn" onclick="togglePlaySpeed()">
                    <span id="speed-icon">▶️</span> <span id="speed-txt">x1</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Settings
        const TILE = 46;
        const GW = 19;
        const GH = 16;
        
        const FIGHTERS = [
            { name: "Chick", icon: "🐥", cost: 30, range: 110, dmg: 10, rate: 45, col: "#f1c40f" },
            { name: "Monkey", icon: "🐒", cost: 50, range: 140, dmg: 22, rate: 50, col: "#9b59b6" },
            { name: "Owl", icon: "🦉", cost: 70, range: 170, dmg: 15, rate: 25, col: "#34495e" },
            { name: "Cat", icon: "🐱", cost: 30, range: 100, dmg: 8, rate: 35, col: "#f39c12" },
            { name: "Wolf", icon: "🐺", cost: 80, range: 150, dmg: 40, rate: 60, col: "#bdc3c7" },
            { name: "Dragon", icon: "🐉", cost: 200, range: 260, dmg: 100, rate: 110, col: "#e74c3c" },
            { name: "Fish", icon: "🐠", cost: 60, range: 130, dmg: 18, rate: 20, col: "#3498db" },
            { name: "Pig", icon: "🐷", cost: 40, range: 120, dmg: 25, rate: 70, col: "#ff9ff3" },
            { name: "Alien", icon: "👽", cost: 100, range: 210, dmg: 15, rate: 15, col: "#1dd1a1" }
        ];

        // Path creation (winding)
        const waypoints = [
            {x: 4, y: 0}, {x: 4, y: 6}, {x: 13, y: 6}, {x: 13, y: 11},
            {x: 6, y: 11}, {x: 6, y: 16}, {x: 19, y: 16}
        ].map(p => ({ x: p.x * TILE + TILE/2, y: p.y * TILE + TILE/2 }));

        // State
        let gold = 500;
        let health = 100;
        let round = 1;
        let speedMult = 1;
        let waveActive = false;
        let shopIdx = -1;
        let activeFighter = null;
        let gameOver = false;

        let fighters = [];
        let enemies = [];
        let projectiles = [];

        function initUI() {
            const grid = document.getElementById('fighter-grid');
            FIGHTERS.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'fighter-item';
                div.id = `f-${i}`;
                div.onclick = () => {
                    shopIdx = i;
                    activeFighter = null;
                    document.getElementById('upgrade-panel').style.display = 'none';
                    document.querySelectorAll('.fighter-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                };
                div.innerHTML = `<div class="f-icon-wrap" style="background:${f.col}">${f.icon}</div><span class="f-cost-tag">${f.cost}</span>`;
                grid.appendChild(div);
            });
            updateStats();
        }

        function updateStats() {
            document.getElementById('gold-ui').innerText = Math.floor(gold);
            document.getElementById('health-ui').innerText = Math.max(0, health);
            document.getElementById('round-ui').innerText = round;
            document.getElementById('life-fill').style.width = health + "%";
        }

        function togglePlaySpeed() {
            speedMult = speedMult === 1 ? 3 : 1;
            document.getElementById('speed-icon').innerText = speedMult === 1 ? "▶️" : "⏩";
            document.getElementById('speed-txt').innerText = "x" + speedMult;
        }

        // Logic Helpers
        function isPath(gx, gy) {
            const px = gx * TILE + TILE/2;
            const py = gy * TILE + TILE/2;
            for(let i=0; i < waypoints.length-1; i++) {
                const v = waypoints[i], w = waypoints[i+1];
                const l2 = (v.x-w.x)**2 + (v.y-w.y)**2;
                let t = ((px-v.x)*(w.x-v.x) + (py-v.y)*(w.y-v.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                const d = Math.hypot(px - (v.x + t*(w.x-v.x)), py - (v.y + t*(w.y-v.y)));
                if (d < TILE * 0.7) return true;
            }
            return false;
        }

        // Classes
        class Enemy {
            constructor() {
                this.x = waypoints[0].x;
                this.y = waypoints[0].y;
                this.target = 1;
                this.maxHp = 30 + (round * 35);
                this.hp = this.maxHp;
                this.speed = 1.6 + (round * 0.05);
            }
            update() {
                const goal = waypoints[this.target];
                const dx = goal.x - this.x;
                const dy = goal.y - this.y;
                const dist = Math.hypot(dx, dy);
                const step = this.speed * speedMult;

                if (dist < step) {
                    this.target++;
                    if (this.target >= waypoints.length) {
                        health -= 5;
                        this.hp = -9999;
                        updateStats();
                        if (health <= 0) doLose();
                    }
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.font = "34px Arial";
                ctx.textAlign = "center";
                ctx.fillText("📦", this.x, this.y + 12);
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x - 20, this.y - 25, 40, 5);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(this.x - 20, this.y - 25, 40 * (Math.max(0, this.hp/this.maxHp)), 5);
            }
        }

        class Fighter {
            constructor(gx, gy, data) {
                this.gx = gx; this.gy = gy;
                this.x = gx * TILE + TILE/2;
                this.y = gy * TILE + TILE/2;
                this.data = JSON.parse(JSON.stringify(data));
                this.level = 1;
                this.timer = 0;
            }
            update() {
                if (this.timer > 0) this.timer -= speedMult;
                if (this.timer <= 0) {
                    const t = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < this.data.range);
                    if (t) {
                        projectiles.push(new Projectile(this.x, this.y, t, this.data.dmg, this.data.col));
                        this.timer = this.data.rate;
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.65; // Seethrough!
                ctx.fillStyle = this.data.col;
                ctx.beginPath();
                ctx.roundRect(this.x-20, this.y-20, 40, 40, 8);
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.font = "32px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.data.icon, this.x, this.y + 2);
                if (activeFighter === this) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.data.range, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, target, dmg, col) {
                this.x = x; this.y = y; this.target = target;
                this.dmg = dmg; this.col = col;
                this.dead = false;
            }
            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                const step = 12 * speedMult;
                if (dist < step) {
                    this.target.hp -= this.dmg;
                    this.dead = true;
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.fillStyle = this.col;
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
            }
        }

        // Gameplay
        canvas.addEventListener('mousedown', (e) => {
            if (gameOver) return;
            const b = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - b.left) / TILE);
            const gy = Math.floor((e.clientY - b.top) / TILE);

            const exp = fighters.find(f => f.gx === gx && f.gy === gy);
            if (exp) {
                showUpgrade(exp);
                return;
            }

            if (shopIdx !== -1) {
                const d = FIGHTERS[shopIdx];
                if (gold >= d.cost && !isPath(gx, gy) && gx > 2) {
                    gold -= d.cost;
                    fighters.push(new Fighter(gx, gy, d));
                    updateStats();
                }
            }
        });

        function showUpgrade(f) {
            activeFighter = f;
            shopIdx = -1;
            document.querySelectorAll('.fighter-item').forEach(el => el.classList.remove('selected'));
            document.getElementById('upgrade-panel').style.display = 'flex';
            document.getElementById('up-name').innerText = f.data.name;
            document.getElementById('up-stats').innerText = `Lv ${f.level} | Dmg: ${Math.round(f.data.dmg)}`;
            document.getElementById('up-cost').innerText = f.level * 60;
        }

        function upgradeSelected() {
            if (!activeFighter) return;
            const cost = activeFighter.level * 60;
            if (gold >= cost) {
                gold -= cost;
                activeFighter.level++;
                activeFighter.data.dmg *= 1.5;
                activeFighter.data.range += 15;
                activeFighter.data.rate *= 0.9;
                showUpgrade(activeFighter);
                updateStats();
            }
        }

        function deselect() {
            activeFighter = null;
            document.getElementById('upgrade-panel').style.display = 'none';
        }

        function startWave() {
            waveActive = true;
            let count = 10 + round * 6;
            let spawned = 0;
            const timer = setInterval(() => {
                if (gameOver) { clearInterval(timer); return; }
                enemies.push(new Enemy());
                spawned++;
                if (spawned >= count) {
                    clearInterval(timer);
                    const checker = setInterval(() => {
                        if (enemies.length === 0) {
                            clearInterval(checker);
                            waveActive = false;
                            round++;
                            gold += 60;
                            updateStats();
                        }
                    }, 500);
                }
            }, 800 / speedMult);
        }

        function doLose() {
            gameOver = true;
            document.getElementById('game-over-pop').style.display = 'flex';
            document.getElementById('final-round').innerText = round;
        }

        function drawBackground() {
            // Sea
            ctx.fillStyle = "#3498db";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            // Shore/Cliff
            ctx.fillStyle = "#8b4513";
            ctx.fillRect(TILE*2.5, 0, TILE*0.8, canvas.height);
            // Grass
            for(let y=0; y<GH; y++) {
                for(let x=3; x<GW; x++) {
                    ctx.fillStyle = (x+y)%2 === 0 ? "#2ecc71" : "#27ae60";
                    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
                }
            }
            // Path
            ctx.strokeStyle = "#8b4513";
            ctx.lineWidth = TILE;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            waypoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            // Inner Path
            ctx.strokeStyle = "#a0522d";
            ctx.lineWidth = TILE * 0.8;
            ctx.stroke();
        }

        function loop() {
            if (gameOver) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawBackground();

            fighters.forEach(f => { f.update(); f.draw(); });
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => {
                e.update(); e.draw();
                if (e.hp <= 0 && e.hp > -1000) { gold += 10; updateStats(); }
            });

            projectiles = projectiles.filter(p => !p.dead && p.target.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            if (!waveActive && enemies.length === 0) startWave();
            requestAnimationFrame(loop);
        }

        // Start
        initUI();
        loop();
    </script>
</body>
</html>
