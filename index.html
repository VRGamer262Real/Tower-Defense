<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Defense Pro</title>
    <style>
        :root {
            --purple: #9b59b6;
            --dark-purple: #8e44ad;
            --wood-dark: #7d4d2d;
            --wood-light: #a0522d;
            --grass-light: #2ecc71;
            --grass-dark: #27ae60;
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: var(--ui-font);
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 1100px;
            height: 750px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 6px solid #333;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        #header {
            height: 60px;
            background: var(--purple);
            border-bottom: 5px solid var(--dark-purple);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 30px;
            gap: 40px;
            font-size: 28px;
            z-index: 5;
        }

        .stat { display: flex; align-items: center; gap: 10px; }

        /* Main Layout */
        #main { display: flex; flex: 1; background: #2c3e50; }

        #canvas-view { position: relative; flex: 1; background: #3498db; }
        canvas { display: block; cursor: crosshair; }

        /* Sidebar */
        #sidebar {
            width: 300px;
            background: var(--wood-dark);
            border-left: 8px solid #5d361b;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.3);
        }

        #round-card {
            background: rgba(0,0,0,0.4);
            border: 4px solid #5d361b;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-size: 24px;
        }

        #shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.1s;
        }

        .shop-item:hover { background: rgba(255, 255, 255, 0.2); }
        .shop-item.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }

        .f-icon-box {
            width: 55px; height: 55px;
            background: #fff;
            margin: 0 auto 5px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .f-cost {
            background: #3498db;
            font-size: 14px;
            border-radius: 5px;
            display: block;
            padding: 2px 0;
        }

        /* Overlay Popups */
        .popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid var(--purple);
            text-align: center;
            z-index: 100;
            min-width: 300px;
        }

        .big-btn {
            background: #2ecc71;
            border: none;
            border-bottom: 6px solid #27ae60;
            color: white;
            padding: 15px 40px;
            font-size: 30px;
            border-radius: 15px;
            cursor: pointer;
            font-family: var(--ui-font);
        }

        .big-btn:active { transform: translateY(2px); border-bottom-width: 4px; }

        #speed-btn {
            background: #3498db;
            border-bottom: 6px solid #2980b9;
            margin-top: auto;
            font-size: 24px;
        }

        #upgrade-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        #game-over { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Header -->
        <div id="header">
            <div class="stat"><span id="gold-ui">400</span> <span style="color:#f1c40f">🪙</span></div>
            <div class="stat"><span id="lives-ui">100</span> <span style="color:#e74c3c">❤️</span></div>
        </div>

        <div id="main">
            <div id="canvas-view">
                <canvas id="gameCanvas" width="800" height="690"></canvas>
                
                <!-- START POPUP -->
                <div id="start-popup" class="popup">
                    <h1 style="font-size: 40px; margin-bottom: 20px;">FIGHTER DEFENSE</h1>
                    <button class="big-btn" onclick="pressStart()">PLAY</button>
                </div>

                <!-- GAME OVER POPUP -->
                <div id="game-over" class="popup">
                    <h1 style="color:#e74c3c; font-size: 50px;">DEFEAT</h1>
                    <p>Round Survived: <span id="final-round">0</span></p>
                    <button class="big-btn" style="background:#3498db; border-color:#2980b9" onclick="location.reload()">RETRY</button>
                </div>
            </div>

            <div id="sidebar">
                <div id="round-card">Round <span id="round-ui">1</span></div>
                
                <div id="shop-grid"></div>

                <div id="upgrade-panel">
                    <div id="u-name" style="color:#f1c40f">Fighter</div>
                    <div id="u-stats" style="font-size:12px; font-family:sans-serif">Lv 1 | Dmg: 10</div>
                    <button class="big-btn" id="u-confirm" style="font-size:16px; padding:10px; width:100%">UPGRADE (<span id="u-cost">50</span>)</button>
                    <button class="big-btn" style="background:#e74c3c; border-color:#c0392b; font-size:12px; padding:5px" onclick="closeUpgrade()">CLOSE</button>
                </div>

                <button id="speed-btn" class="big-btn" onclick="toggleSpeed()">
                    ▶️ x1
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const TILE_SIZE = 45;
        const GRID_W = 18;
        const GRID_H = 16;

        const FIGHTER_LIB = [
            { name: "Chick", icon: "🐥", cost: 30, range: 100, dmg: 12, rate: 45, col: "#f1c40f" },
            { name: "Monkey", icon: "🐒", cost: 50, range: 130, dmg: 20, rate: 50, col: "#9b59b6" },
            { name: "Owl", icon: "🦉", cost: 70, range: 160, dmg: 16, rate: 25, col: "#34495e" },
            { name: "Dragon", icon: "🐉", cost: 150, range: 250, dmg: 85, rate: 100, col: "#e74c3c" },
            { name: "Pig", icon: "🐷", cost: 40, range: 110, dmg: 25, rate: 70, col: "#ff9ff3" },
            { name: "Alien", icon: "👽", cost: 100, range: 200, dmg: 15, rate: 15, col: "#1dd1a1" }
        ];

        // Wave path
        const waypoints = [
            {x: 4, y: 0}, {x: 4, y: 5}, {x: 13, y: 5}, {x: 13, y: 11},
            {x: 6, y: 11}, {x: 6, y: 15}, {x: 18, y: 15}
        ].map(p => ({ x: p.x * TILE_SIZE + TILE_SIZE/2, y: p.y * TILE_SIZE + TILE_SIZE/2 }));

        let gold = 400;
        let lives = 100;
        let round = 1;
        let playSpeed = 1;
        let gameRunning = false;
        let waveActive = false;
        let spawning = false;
        let shopIdx = -1;
        let activeFighter = null;

        let fighters = [];
        let enemies = [];
        let projectiles = [];

        function init() {
            const grid = document.getElementById('shop-grid');
            FIGHTER_LIB.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.id = `shop-${i}`;
                div.onclick = () => selectShop(i);
                div.innerHTML = `<div class="f-icon-box" style="background:${f.col}">${f.icon}</div><span class="f-cost">${f.cost}</span>`;
                grid.appendChild(div);
            });
            updateUI();
        }

        function pressStart() {
            document.getElementById('start-popup').style.display = 'none';
            gameRunning = true;
            loop();
        }

        function toggleSpeed() {
            playSpeed = playSpeed === 1 ? 3 : 1;
            document.getElementById('speed-btn').innerHTML = playSpeed === 1 ? "▶️ x1" : "⏩ x3";
        }

        function updateUI() {
            document.getElementById('gold-ui').innerText = Math.floor(gold);
            document.getElementById('lives-ui').innerText = lives;
            document.getElementById('round-ui').innerText = round;
        }

        function selectShop(i) {
            shopIdx = i;
            activeFighter = null;
            document.getElementById('upgrade-panel').style.display = 'none';
            document.querySelectorAll('.shop-item').forEach(s => s.classList.remove('selected'));
            document.getElementById(`shop-${i}`).classList.add('selected');
        }

        // --- Core Classes ---

        class Enemy {
            constructor() {
                this.x = waypoints[0].x;
                this.y = waypoints[0].y;
                this.target = 1;
                this.maxHp = 30 + (round * 28);
                this.hp = this.maxHp;
                this.speed = 1.6 + (round * 0.06);
            }
            update() {
                const goal = waypoints[this.target];
                const dx = goal.x - this.x;
                const dy = goal.y - this.y;
                const dist = Math.hypot(dx, dy);
                const step = this.speed * playSpeed;

                if (dist < step) {
                    this.target++;
                    if (this.target >= waypoints.length) {
                        lives -= 10;
                        this.hp = -9999;
                        updateUI();
                        if (lives <= 0) doGameOver();
                    }
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("📦", this.x, this.y + 10);
                // Health bar
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x - 20, this.y - 25, 40, 5);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(this.x - 20, this.y - 25, 40 * (Math.max(0, this.hp/this.maxHp)), 5);
            }
        }

        class Fighter {
            constructor(gx, gy, data) {
                this.gx = gx; this.gy = gy;
                this.x = gx * TILE_SIZE + TILE_SIZE/2;
                this.y = gy * TILE_SIZE + TILE_SIZE/2;
                this.data = JSON.parse(JSON.stringify(data));
                this.level = 1;
                this.cd = 0;
            }
            update() {
                if (this.cd > 0) this.cd -= playSpeed;
                if (this.cd <= 0) {
                    const target = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < this.data.range);
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.data.dmg, this.data.col));
                        this.cd = this.data.rate;
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.6; // Requested seethrough look
                ctx.fillStyle = this.data.col;
                ctx.beginPath();
                ctx.roundRect(this.x-20, this.y-20, 40, 40, 8);
                ctx.fill();
                
                ctx.globalAlpha = 1.0;
                ctx.font = "32px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.data.icon, this.x, this.y + 2);

                if (activeFighter === this) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.data.range, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, target, dmg, col) {
                this.x = x; this.y = y; this.target = target;
                this.dmg = dmg; this.col = col;
                this.dead = false;
            }
            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                const step = 12 * playSpeed;
                if (dist < step) {
                    this.target.hp -= this.dmg;
                    this.dead = true;
                } else {
                    this.x += (dx/dist) * step;
                    this.y += (dy/dist) * step;
                }
            }
            draw() {
                ctx.fillStyle = this.col;
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- Interaction ---

        canvas.addEventListener('mousedown', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const gy = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            const existing = fighters.find(f => f.gx === gx && f.gy === gy);
            if (existing) {
                openUpgrade(existing);
                return;
            }

            if (shopIdx !== -1) {
                const data = FIGHTER_LIB[shopIdx];
                if (gold >= data.cost && !isPath(gx, gy)) {
                    gold -= data.cost;
                    fighters.push(new Fighter(gx, gy, data));
                    updateUI();
                }
            }
        });

        function isPath(gx, gy) {
            const px = gx * TILE_SIZE + TILE_SIZE/2;
            const py = gy * TILE_SIZE + TILE_SIZE/2;
            for(let i=0; i<waypoints.length-1; i++) {
                const v = waypoints[i], w = waypoints[i+1];
                const l2 = (v.x-w.x)**2 + (v.y-w.y)**2;
                let t = ((px-v.x)*(w.x-v.x) + (py-v.y)*(w.y-v.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                const d = Math.hypot(px - (v.x + t*(w.x-v.x)), py - (v.y + t*(w.y-v.y)));
                if (d < TILE_SIZE * 0.7) return true;
            }
            return false;
        }

        function openUpgrade(f) {
            activeFighter = f;
            shopIdx = -1;
            document.querySelectorAll('.shop-item').forEach(s => s.classList.remove('selected'));
            document.getElementById('upgrade-panel').style.display = 'flex';
            document.getElementById('u-name').innerText = f.data.name;
            document.getElementById('u-stats').innerText = `Lv ${f.level} | Dmg: ${Math.round(f.data.dmg)}`;
            document.getElementById('u-cost').innerText = f.level * 60;
            
            document.getElementById('u-confirm').onclick = () => {
                const cost = activeFighter.level * 60;
                if (gold >= cost) {
                    gold -= cost;
                    activeFighter.level++;
                    activeFighter.data.dmg *= 1.4;
                    activeFighter.data.range += 12;
                    activeFighter.data.rate *= 0.92;
                    openUpgrade(activeFighter);
                    updateUI();
                }
            };
        }

        function closeUpgrade() {
            activeFighter = null;
            document.getElementById('upgrade-panel').style.display = 'none';
        }

        // --- Manager ---

        function spawnWave() {
            waveActive = true;
            spawning = true;
            let count = 10 + round * 6;
            let spawned = 0;
            const timer = setInterval(() => {
                if (!gameRunning) { clearInterval(timer); return; }
                enemies.push(new Enemy());
                spawned++;
                if (spawned >= count) {
                    clearInterval(timer);
                    spawning = false;
                }
            }, 800 / playSpeed);
        }

        function doGameOver() {
            gameRunning = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-round').innerText = round;
        }

        function drawMap() {
            // Beach/Sea on left
            ctx.fillStyle = "#3498db";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(TILE_SIZE * 1.5, 0, TILE_SIZE, canvas.height);

            // Grass
            for(let y=0; y<GRID_H; y++) {
                for(let x=2; x<GRID_W; x++) {
                    ctx.fillStyle = (x+y)%2 === 0 ? "#2ecc71" : "#27ae60";
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }

            // Brown Path
            ctx.strokeStyle = "#8b4513";
            ctx.lineWidth = TILE_SIZE;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            waypoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            ctx.strokeStyle = "#a0522d";
            ctx.lineWidth = TILE_SIZE * 0.8;
            ctx.stroke();
        }

        function loop() {
            if (!gameRunning) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawMap();

            fighters.forEach(f => { f.update(); f.draw(); });
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => {
                e.update(); e.draw();
                if (e.hp <= 0 && e.hp > -1000) { gold += 10; updateUI(); }
            });

            projectiles = projectiles.filter(p => !p.dead && p.target.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            if (!waveActive && enemies.length === 0) {
                if (!spawning) {
                    if (round > 1) { gold += 50; updateUI(); }
                    spawnWave();
                }
            }
            if (waveActive && enemies.length === 0 && !spawning) {
                waveActive = false;
                round++;
                updateUI();
            }

            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
